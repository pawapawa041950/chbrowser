<!DOCTYPE html>
<!--
  AI チャットウィンドウの会話表示シェル (イベント駆動・追記式)。
  C# (AiChatWindow) から PostWebMessageAsJson でセマンティックなイベントを受け取り、安定した DOM ノードに
  「追記 / 末尾更新」する。旧来の「全文を innerHTML で総入れ替え」方式はクリック握り潰し・選択喪失・
  折りたたみ喪失・チラつき・O(n^2) 再変換の原因だったため廃止した。

  markdown→HTML はサーバ側 (Markdig, TranscriptStreamer 経由) で「ブロック単位」に変換済みのものが届く。
  確定済みブロックは一度だけ届いて凍結され、末尾の伸長中ブロックだけが更新される。よってユーザが触る
  ノード (think の <details> 等) はストリーミング中に作り替えられず、クリック / 選択 / 開閉が常時効く。

  C# → JS メッセージ:
    { type:'addUser',     text }                       ユーザ発言バブルを追加 (プレーンテキスト)
    { type:'begin' }                                   空のアシスタントバブルを作り「現在の応答先」にする
    { type:'seg', ch, idx, kind, html|label, failed }  チャネル ch のセグメント idx を upsert
                                                        kind: 'text' | 'think' (html) / 'tool' (label, failed)
                                                        ch:   'work' | 'body' | 'sec:<id>'
    { type:'trunc', ch, keep }                         チャネル ch のセグメント idx>=keep を削除
    { type:'section', id, title }                      作業エリアに区画 (dispatch_task) を作る
    { type:'sectionDone', id, status, finding }        区画の見出しに状態アイコン + finding
    { type:'plan', items:[{text,done}] }               計画チェックリストの更新
    { type:'summary', text }                           作業エリア折りたたみバーの文言
    { type:'notice', text }                            非致命の注記 (中断 / 一部失敗) を本文に追記
    { type:'error',  text }                            現在のバブルを確定しエラーバブルを追加
    { type:'end' }                                     応答確定 (ストリーミングカーソル除去)
  JS → C# メッセージ:
    { type:'openExternal', url }                       バブル内リンクのクリック (= 既定ブラウザで開く要求)
    { type:'ready' }                                   シェル初期化完了
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #ffffff;
    font-family: "Yu Gothic UI", "Meiryo", "Segoe UI", sans-serif;
    font-size: 13px;
    color: #1a1a1a;
  }
  #messages {
    padding: 10px 12px 16px;
    box-sizing: border-box;
  }
  .msg {
    max-width: 86%;
    margin: 6px 0;
    padding: 7px 10px;
    border-radius: 8px;
    box-sizing: border-box;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .msg .role {
    font-size: 10px;
    font-weight: 600;
    color: #888;
    margin-bottom: 3px;
  }
  /* ユーザ発言: 右寄せ・薄青。プレーンテキストなので改行を保持。 */
  .msg.user {
    margin-left: auto;
    background: #d6e8ff;
  }
  .msg.user .body { white-space: pre-wrap; }
  /* アシスタント発言: 左寄せ・薄灰。中身は markdown 由来の HTML。 */
  .msg.assistant {
    margin-right: auto;
    background: #f0f0f0;
  }
  /* エラー: 左寄せ・薄赤。 */
  .msg.error {
    margin-right: auto;
    background: #fce4e4;
    color: #802020;
    white-space: pre-wrap;
  }
  /* ストリーミング中の点滅カーソル風インジケータ。 */
  .msg.assistant.streaming .final-body::after {
    content: "▍";
    color: #888;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- markdown 要素のスタイル (アシスタントバブル内) ---- */
  .msg.assistant .body > :first-child { margin-top: 0; }
  .msg.assistant .body > :last-child  { margin-bottom: 0; }
  .msg.assistant .body p { margin: 6px 0; line-height: 1.5; }
  .msg.assistant .body h1,
  .msg.assistant .body h2,
  .msg.assistant .body h3,
  .msg.assistant .body h4 { margin: 10px 0 4px; line-height: 1.3; }
  .msg.assistant .body h1 { font-size: 1.35em; }
  .msg.assistant .body h2 { font-size: 1.22em; }
  .msg.assistant .body h3 { font-size: 1.10em; }
  .msg.assistant .body h4 { font-size: 1.02em; }
  .msg.assistant .body ul,
  .msg.assistant .body ol { margin: 6px 0; padding-left: 1.5em; }
  .msg.assistant .body li { margin: 2px 0; line-height: 1.5; }
  .msg.assistant .body a { color: #1565c0; }
  .msg.assistant .body code {
    background: #e4e4e4;
    border-radius: 3px;
    padding: 1px 4px;
    font-family: "Consolas", "Cascadia Mono", monospace;
    font-size: 0.92em;
  }
  .msg.assistant .body pre {
    background: #2d2d2d;
    color: #f0f0f0;
    border-radius: 6px;
    padding: 8px 10px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .msg.assistant .body pre code {
    background: transparent;
    color: inherit;
    padding: 0;
    font-size: 0.9em;
  }
  .msg.assistant .body blockquote {
    margin: 6px 0;
    padding: 2px 10px;
    border-left: 3px solid #bbb;
    color: #555;
  }
  .msg.assistant .body table {
    border-collapse: collapse;
    margin: 6px 0;
    font-size: 0.95em;
  }
  .msg.assistant .body th,
  .msg.assistant .body td {
    border: 1px solid #ccc;
    padding: 3px 8px;
  }
  .msg.assistant .body th { background: #e8e8e8; }
  .msg.assistant .body hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 10px 0;
  }
  .msg.assistant .body img { max-width: 100%; height: auto; }

  /* テキストセグメントの隣接マージン整理 (= ブロック分割しても余白が崩れないように) */
  .msg.assistant .body .seg > :first-child { margin-top: 0; }
  .msg.assistant .body .seg > :last-child  { margin-bottom: 0; }
  .msg.assistant .body .seg { margin: 6px 0; }

  /* ---- 思考過程ブロック (= 推論モデルの think) ---- */
  .msg.assistant .body details.think-block {
    margin: 6px 0;
    padding: 4px 8px;
    border-left: 3px solid #c4c4c4;
    background: #fafafa;
    border-radius: 4px;
    font-size: 0.92em;
    color: #555;
  }
  .msg.assistant .body details.think-block > summary {
    cursor: pointer;
    color: #777;
    font-weight: 600;
    font-size: 11px;
    user-select: none;
    list-style: revert;
  }
  .msg.assistant .body details.think-block > .think-body { margin-top: 4px; font-style: italic; }
  .msg.assistant .body details.think-block > .think-body > :first-child { margin-top: 0; }
  .msg.assistant .body details.think-block > .think-body > :last-child  { margin-bottom: 0; }
  .msg.assistant .body details.think-block > .think-body p { margin: 3px 0; line-height: 1.45; }

  /* ---- agent work 折りたたみバー ---- */
  .msg.assistant .body details.agent-work {
    margin: 4px 0 8px;
    padding: 0;
    background: #f5f6f8;
    border-left: 3px solid #b6bcc6;
    border-radius: 4px;
    font-size: 0.9em;
    overflow: hidden;
  }
  .msg.assistant .body details.agent-work > summary {
    padding: 6px 10px;
    cursor: pointer;
    color: #4b5563;
    font-weight: 500;
    user-select: none;
    list-style: revert;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .msg.assistant .body details.agent-work[open] > summary { border-bottom: 1px solid #d8dce4; }
  .msg.assistant .body details.agent-work > .agent-work-body { padding: 6px 10px 4px; }
  .msg.assistant .body details.agent-work > .agent-work-body > :first-child { margin-top: 0; }

  /* dispatch_task 区画 */
  .msg.assistant .body .work-section { margin: 6px 0; }
  .msg.assistant .body .work-section-head { font-weight: 600; color: #4b5563; font-size: 0.92em; margin: 4px 0 2px; }
  .msg.assistant .body .work-section-find { color: #555; font-size: 0.9em; margin: 2px 0 6px; }
  .msg.assistant .body .plan { margin: 4px 0; font-size: 0.9em; color: #4b5563; }
  .msg.assistant .body .plan .plan-item { line-height: 1.5; }
  .msg.assistant .body .notice { color: #7a6a20; font-style: italic; margin: 6px 0; }

  /* 回答欄末尾の計測表示 (小さく薄め) */
  .msg.assistant .body .metrics { margin-top: 6px; color: #aaa; font-size: 10px; line-height: 1.45; }
  .msg.assistant .body .metrics .metrics-line { white-space: nowrap; }

  /* ---- ツール呼び出し行 ---- */
  .msg.assistant .body .tool-call-line {
    margin: 6px 0;
    padding: 3px 8px;
    background: #eef4ff;
    border-left: 3px solid #6b9bd1;
    border-radius: 4px;
    font-size: 0.85em;
    color: #2a4a68;
    font-family: "Consolas", "Cascadia Mono", "Yu Gothic UI", monospace;
    word-break: break-all;
  }
  .msg.assistant .body .tool-call-line .tool-call-label { font-weight: 700; margin-right: 8px; color: #1e4070; }
  .msg.assistant .body .tool-call-line .tool-call-args { color: #2a4a68; }
</style>
</head>
<body>
<div id="messages"></div>
<script>
(function () {
  "use strict";
  var messages = document.getElementById("messages");

  // 現在のアシスタントバブルの主要ノード
  var bubble = null, summaryEl = null, workBody = null, planEl = null, sectionsEl = null, finalEl = null, metricsEl = null;
  var chSegs = {};       // chId -> [segment node...]
  var sectionEls = {};   // sectionId -> { root, body, head, find }

  // ---- autoscroll: 末尾に張り付くが、ユーザが上にスクロールしたら追従停止する ----
  var AT_BOTTOM_PX = 30;
  var autoScrollEnabled = true;
  function isNearBottom() {
    return (window.scrollY + window.innerHeight) >= (document.body.scrollHeight - AT_BOTTOM_PX);
  }
  window.addEventListener("scroll", function () { autoScrollEnabled = isNearBottom(); }, { passive: true });
  function scrollToBottom() {
    if (!autoScrollEnabled) return;
    window.scrollTo(0, document.body.scrollHeight);
  }

  function el(tag, cls) { var n = document.createElement(tag); if (cls) n.className = cls; return n; }

  function makeBubble(kind, roleLabel) {
    var msg = el("div", "msg " + kind);
    var role = el("div", "role"); role.textContent = roleLabel;
    var body = el("div", "body");
    msg.appendChild(role); msg.appendChild(body); messages.appendChild(msg);
    return { msg: msg, body: body };
  }

  function addUser(text) {
    var b = makeBubble("user", "あなた");
    b.body.textContent = text;
    autoScrollEnabled = true;
    window.scrollTo(0, document.body.scrollHeight);
  }

  // ---- アシスタントバブル (イベント駆動) ----

  function begin() {
    var msg = el("div", "msg assistant streaming");
    var role = el("div", "role"); role.textContent = "AI";
    var body = el("div", "body");

    var details = el("details", "agent-work");      // 既定は折りたたみ
    summaryEl = el("summary"); summaryEl.textContent = "作業中…";
    var awBody = el("div", "agent-work-body");
    workBody = el("div", "ch-work");
    planEl = el("div", "plan");
    sectionsEl = el("div", "sections");
    awBody.appendChild(workBody); awBody.appendChild(planEl); awBody.appendChild(sectionsEl);
    details.appendChild(summaryEl); details.appendChild(awBody);

    finalEl = el("div", "final-body");
    metricsEl = el("div", "metrics");   // 回答欄末尾の計測 (TTFT / 推論 / 合計 / token/s / 総トークン)

    body.appendChild(details); body.appendChild(finalEl); body.appendChild(metricsEl);
    msg.appendChild(role); msg.appendChild(body); messages.appendChild(msg);

    bubble = msg; chSegs = {}; sectionEls = {};
    scrollToBottom();
  }

  function containerFor(ch) {
    if (ch === "work") return workBody;
    if (ch === "body") return finalEl;
    if (ch && ch.indexOf("sec:") === 0) {
      var s = sectionEls[ch.slice(4)];
      return s ? s.body : null;
    }
    return null;
  }

  function makeThink() {
    var d = el("details", "think-block"); d.open = true; d._k = "think";
    var s = el("summary"); s.textContent = "思考過程";
    var b = el("div", "think-body");
    d.appendChild(s); d.appendChild(b);
    return d;
  }
  function makeTool(label, failed) {
    var d = el("div", "tool-call-line"); d._k = "tool";
    var l = el("span", "tool-call-label"); l.textContent = "ツール";
    var a = el("span", "tool-call-args"); a.textContent = (failed ? "⚠ " : "") + (label || "");
    d.appendChild(l); d.appendChild(a);
    return d;
  }

  // idx 位置にノードを配置 (= 既存なら置換、末尾なら追加、隙間は防御的に埋める)。
  function putAt(cont, arr, idx, node) {
    if (idx < arr.length) {
      var old = arr[idx];
      if (old && old.parentNode === cont) cont.replaceChild(node, old);
      else cont.appendChild(node);
      arr[idx] = node;
    } else {
      while (arr.length < idx) { var ph = el("div", "seg"); ph._k = "text"; cont.appendChild(ph); arr.push(ph); }
      cont.appendChild(node); arr[idx] = node;
    }
  }

  function seg(m) {
    if (!bubble) return;
    var cont = containerFor(m.ch); if (!cont) return;
    var arr = chSegs[m.ch] || (chSegs[m.ch] = []);
    var idx = m.idx | 0;
    var node = arr[idx];

    if (m.kind === "think") {
      if (!node || node._k !== "think") { node = makeThink(); putAt(cont, arr, idx, node); }
      node.querySelector(".think-body").innerHTML = m.html || "";
    } else if (m.kind === "tool") {
      var fresh = makeTool(m.label || "", !!m.failed);
      putAt(cont, arr, idx, fresh);
    } else { // text
      if (!node || node._k !== "text") { node = el("div", "seg"); node._k = "text"; putAt(cont, arr, idx, node); }
      node.innerHTML = m.html || "";
    }
    scrollToBottom();
  }

  function trunc(m) {
    var cont = containerFor(m.ch); var arr = chSegs[m.ch];
    if (!cont || !arr) return;
    var keep = m.keep | 0;
    for (var i = arr.length - 1; i >= keep; i--) {
      if (arr[i] && arr[i].parentNode === cont) cont.removeChild(arr[i]);
      arr.pop();
    }
  }

  function section(m) {
    if (!sectionsEl || sectionEls[m.id]) return;
    var root = el("div", "work-section");
    var head = el("div", "work-section-head"); head.textContent = "▼ " + (m.title || "");
    var body = el("div", "section-body");
    var find = el("div", "work-section-find"); find.style.display = "none";
    root.appendChild(head); root.appendChild(body); root.appendChild(find);
    sectionsEl.appendChild(root);
    sectionEls[m.id] = { root: root, body: body, head: head, find: find, title: m.title || "" };
    scrollToBottom();
  }
  function sectionDone(m) {
    var s = sectionEls[m.id]; if (!s) return;
    var icon = m.status === "done" ? "✓" : (m.status === "partial" ? "◐" : "✗");
    s.head.textContent = icon + " " + s.title;
    if (m.finding) { s.find.style.display = ""; s.find.textContent = m.finding; }
    scrollToBottom();
  }

  function plan(m) {
    if (!planEl) return;
    if (!m.items || !m.items.length) { planEl.textContent = ""; return; }
    planEl.textContent = "";
    for (var i = 0; i < m.items.length; i++) {
      var it = m.items[i];
      var row = el("div", "plan-item");
      row.textContent = (it.done ? "☑ " : "☐ ") + (it.text || "");
      planEl.appendChild(row);
    }
    scrollToBottom();
  }

  function summary(m) { if (summaryEl) summaryEl.textContent = m.text || "作業"; }

  function metrics(m) {
    if (!metricsEl) return;
    var f = function (x) { return (typeof x === "number" ? x : 0).toFixed(2); };
    metricsEl.textContent = "";
    var l1 = el("div", "metrics-line");
    l1.textContent = "TTFT " + f(m.ttft) + "s  推論 " + f(m.reasoning) + "s  合計 " + f(m.total) + "s";
    var l2 = el("div", "metrics-line");
    l2.textContent = f(m.tps) + " tok/s  " + (m.tokens | 0) + " tokens";
    metricsEl.appendChild(l1); metricsEl.appendChild(l2);
    scrollToBottom();
  }

  function notice(m) {
    if (!finalEl) return;
    var n = el("div", "notice"); n.textContent = m.text || "";
    finalEl.appendChild(n); scrollToBottom();
  }

  function endTurn() {
    if (bubble) { bubble.classList.remove("streaming"); bubble = null; }
  }

  function errorMsg(text) {
    endTurn();
    var b = makeBubble("error", "エラー");
    b.body.textContent = text || "";
    scrollToBottom();
  }

  // バブル内リンクのクリックは WebView2 内で遷移させず、C# に「既定ブラウザで開いて」と依頼する。
  // (think の <details> はネイティブ toggle がそのまま効く — ノードを作り替えないので握り潰されない。)
  document.addEventListener("click", function (e) {
    var a = e.target && e.target.closest ? e.target.closest("a[href]") : null;
    if (!a) return;
    e.preventDefault();
    var url = a.getAttribute("href") || "";
    if (url && window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage({ type: "openExternal", url: url });
    }
  });

  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener("message", function (e) {
      var m = e.data;
      if (!m || typeof m !== "object" || !m.type) return;
      switch (m.type) {
        case "addUser":     addUser(m.text || ""); break;
        case "begin":       begin(); break;
        case "seg":         seg(m); break;
        case "trunc":       trunc(m); break;
        case "section":     section(m); break;
        case "sectionDone": sectionDone(m); break;
        case "plan":        plan(m); break;
        case "summary":     summary(m); break;
        case "metrics":     metrics(m); break;
        case "notice":      notice(m); break;
        case "error":       errorMsg(m.text || ""); break;
        case "end":         endTurn(); break;
      }
    });
    window.chrome.webview.postMessage({ type: "ready" });
  }
})();
</script>
</body>
</html>
